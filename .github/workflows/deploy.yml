name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets exist
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "ERROR: SUPABASE_URL secret is not set!"
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "ERROR: SUPABASE_ANON_KEY secret is not set!"
            exit 1
          fi
          echo "Both secrets are present."

      - name: Inject secrets into meta tags
        run: |
          python3 - <<'PYEOF'
          import os, sys

          url = "${{ secrets.SUPABASE_URL }}"
          key = "${{ secrets.SUPABASE_ANON_KEY }}"

          print(f"URL starts with: {url[:10]}...")
          print(f"Key starts with: {key[:10]}...")

          with open('index.html', 'r') as f:
              html = f.read()

          html = html.replace(
              '<meta name="supabase-url" content="">',
              f'<meta name="supabase-url" content="{url}">'
          )
          html = html.replace(
              '<meta name="supabase-anon-key" content="">',
              f'<meta name="supabase-anon-key" content="{key}">'
          )

          with open('index.html', 'w') as f:
              f.write(html)

          if url not in html or key not in html:
              print("INJECTION FAILED")
              sys.exit(1)

          print("Injection successful!")
          PYEOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v5
        id: deployment
