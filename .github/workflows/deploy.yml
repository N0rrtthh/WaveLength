name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets into meta tags
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os, re
          url = os.environ['SUPABASE_URL']
          key = os.environ['SUPABASE_ANON_KEY']
          with open('index.html', 'r') as f:
            html = f.read()
          html = re.sub(r'(<meta name="supabase-url" content=")[^"]*(")', r'\g<1>' + url + r'\2', html)
          html = re.sub(r'(<meta name="supabase-anon-key" content=")[^"]*(")', r'\g<1>' + key + r'\2', html)
          with open('index.html', 'w') as f:
            f.write(html)
          print('URL injected:', url[:30] + '...')
          print('Key injected:', key[:10] + '...')
          PYEOF

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v5
        id: deployment
