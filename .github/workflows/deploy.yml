name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Pages uses Actions deployments
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.request('PATCH /repos/{owner}/{repo}/pages', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                build_type: 'workflow'
              });
            } catch (error) {
              core.warning(`Failed to set Pages build_type to workflow: ${error.message}`);
            }

      - name: Inject config
        run: |
          cat > config.js <<EOF
          window.WAVELENGTH_CONFIG = {
            supabaseUrl: '${{ secrets.SUPABASE_URL }}',
            supabaseAnonKey: '${{ secrets.SUPABASE_ANON_KEY }}',
          };
          EOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v5
        id: deployment
