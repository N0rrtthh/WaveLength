name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets into meta tags
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os, re

          url = os.environ['SUPABASE_URL']
          key = os.environ['SUPABASE_ANON_KEY']

          with open('index.html', 'r') as f:
              html = f.read()

          html = html.replace(
              '<meta name="supabase-url" content="">',
              f'<meta name="supabase-url" content="{url}">'
          )
          html = html.replace(
              '<meta name="supabase-anon-key" content="">',
              f'<meta name="supabase-anon-key" content="{key}">'
          )

          with open('index.html', 'w') as f:
              f.write(html)

          print(f"URL injected: {'yes' if url in html else 'NO - FAILED'}")
          print(f"Key injected: {'yes' if key in html else 'NO - FAILED'}")
          PYEOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v5
        id: deployment
